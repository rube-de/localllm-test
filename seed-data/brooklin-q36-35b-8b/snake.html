<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Snake Game</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #1a1a2e;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                flex-direction: column;
                gap: 15px;
            }

            h1 {
                color: #00ff88;
                font-size: 2rem;
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            }

            #gameContainer {
                position: relative;
            }

            canvas {
                border: 3px solid #00ff88;
                border-radius: 8px;
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
                background: #16213e;
            }

            #scoreboard {
                display: flex;
                justify-content: space-between;
                width: 400px;
                color: #e0e0e0;
                font-size: 1.2rem;
            }

            #scoreboard span {
                color: #00ff88;
                font-weight: bold;
            }

            #gameOver {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.85);
                color: white;
                padding: 30px 40px;
                border-radius: 12px;
                text-align: center;
                border: 2px solid #ff4757;
            }

            #gameOver h2 {
                color: #ff4757;
                font-size: 1.8rem;
                margin-bottom: 10px;
            }

            #gameOver p {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            #gameOver button {
                padding: 10px 25px;
                font-size: 1rem;
                background: #00ff88;
                color: #1a1a2e;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }

            #gameOver button:hover {
                background: #00cc6a;
            }

            #instructions {
                color: #888;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <h1>🐍 Snake Game</h1>

        <div id="scoreboard">
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="highScore">0</span></div>
        </div>

        <div id="gameContainer">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="gameOver">
                <h2>Game Over!</h2>
                <p>Your score: <span id="finalScore">0</span></p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <p id="instructions">
            Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move
        </p>

        <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const gridSize = 20;
            const tileCount = canvas.width / gridSize;

            let snake,
                food,
                direction,
                nextDirection,
                score,
                highScore,
                gameLoop,
                speed;

            highScore = localStorage.getItem("snakeHighScore") || 0;
            document.getElementById("highScore").textContent = highScore;

            function init() {
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                ];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                score = 0;
                speed = 120;
                document.getElementById("score").textContent = score;
                document.getElementById("gameOver").style.display = "none";
                placeFood();
            }

            function placeFood() {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                };
                // Make sure food doesn't spawn on the snake
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        placeFood();
                        return;
                    }
                }
            }

            function update() {
                direction = { ...nextDirection };

                const head = {
                    x: snake[0].x + direction.x,
                    y: snake[0].y + direction.y,
                };

                // Wall collision
                if (
                    head.x < 0 ||
                    head.x >= tileCount ||
                    head.y < 0 ||
                    head.y >= tileCount
                ) {
                    gameOver();
                    return;
                }

                // Self collision
                for (let part of snake) {
                    if (part.x === head.x && part.y === head.y) {
                        gameOver();
                        return;
                    }
                }

                snake.unshift(head);

                // Eat food
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById("score").textContent = score;
                    placeFood();
                    // Speed up slightly
                    if (speed > 60) {
                        speed -= 2;
                        clearInterval(gameLoop);
                        gameLoop = setInterval(gameStep, speed);
                    }
                } else {
                    snake.pop();
                }
            }

            function draw() {
                // Clear canvas
                ctx.fillStyle = "#16213e";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw grid (subtle)
                ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
                ctx.lineWidth = 0.5;
                for (let i = 0; i < tileCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * gridSize, 0);
                    ctx.lineTo(i * gridSize, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * gridSize);
                    ctx.lineTo(canvas.width, i * gridSize);
                    ctx.stroke();
                }

                // Draw food with glow
                ctx.shadowColor = "#ff4757";
                ctx.shadowBlur = 15;
                ctx.fillStyle = "#ff4757";
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2,
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // Draw snake
                snake.forEach((part, index) => {
                    const ratio = 1 - (index / snake.length) * 0.5;
                    const r = Math.round(0 * ratio);
                    const g = Math.round(255 * ratio);
                    const b = Math.round(136 * ratio);

                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

                    if (index === 0) {
                        // Head - rounded
                        ctx.shadowColor = "#00ff88";
                        ctx.shadowBlur = 10;
                        roundRect(
                            ctx,
                            part.x * gridSize + 1,
                            part.y * gridSize + 1,
                            gridSize - 2,
                            gridSize - 2,
                            5,
                        );
                        ctx.shadowBlur = 0;

                        // Eyes
                        ctx.fillStyle = "#1a1a2e";
                        let eyeOffsetX1, eyeOffsetY1, eyeOffsetX2, eyeOffsetY2;
                        if (direction.x === 1) {
                            eyeOffsetX1 = 12;
                            eyeOffsetY1 = 5;
                            eyeOffsetX2 = 12;
                            eyeOffsetY2 = 13;
                        } else if (direction.x === -1) {
                            eyeOffsetX1 = 6;
                            eyeOffsetY1 = 5;
                            eyeOffsetX2 = 6;
                            eyeOffsetY2 = 13;
                        } else if (direction.y === -1) {
                            eyeOffsetX1 = 5;
                            eyeOffsetY1 = 6;
                            eyeOffsetX2 = 13;
                            eyeOffsetY2 = 6;
                        } else {
                            eyeOffsetX1 = 5;
                            eyeOffsetY1 = 12;
                            eyeOffsetX2 = 13;
                            eyeOffsetY2 = 12;
                        }
                        ctx.beginPath();
                        ctx.arc(
                            part.x * gridSize + eyeOffsetX1,
                            part.y * gridSize + eyeOffsetY1,
                            2,
                            0,
                            Math.PI * 2,
                        );
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(
                            part.x * gridSize + eyeOffsetX2,
                            part.y * gridSize + eyeOffsetY2,
                            2,
                            0,
                            Math.PI * 2,
                        );
                        ctx.fill();
                    } else {
                        roundRect(
                            ctx,
                            part.x * gridSize + 1.5,
                            part.y * gridSize + 1.5,
                            gridSize - 3,
                            gridSize - 3,
                            4,
                        );
                    }
                });
            }

            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
                ctx.fill();
            }

            function gameStep() {
                update();
                draw();
            }

            function gameOver() {
                clearInterval(gameLoop);
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    document.getElementById("highScore").textContent =
                        highScore;
                }
                document.getElementById("finalScore").textContent = score;
                document.getElementById("gameOver").style.display = "block";
            }

            function resetGame() {
                clearInterval(gameLoop);
                init();
                gameLoop = setInterval(gameStep, speed);
            }

            // Keyboard controls
            document.addEventListener("keydown", (e) => {
                switch (e.key) {
                    case "ArrowUp":
                    case "w":
                    case "W":
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        e.preventDefault();
                        break;
                    case "ArrowDown":
                    case "s":
                    case "S":
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        e.preventDefault();
                        break;
                    case "ArrowLeft":
                    case "a":
                    case "A":
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        e.preventDefault();
                        break;
                    case "ArrowRight":
                    case "d":
                    case "D":
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        e.preventDefault();
                        break;
                }
            });

            // Start the game
            init();
            gameLoop = setInterval(gameStep, speed);
        </script>
    </body>
</html>
