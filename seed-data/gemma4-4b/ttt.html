<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic-Tac-Toe</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 50px;
                background-color: #f4f4f9;
            }

            h1 {
                color: #333;
                margin-bottom: 20px;
            }

            #gameBoard {
                display: grid;
                grid-template-columns: repeat(3, 100px);
                grid-template-rows: repeat(3, 100px);
                gap: 5px;
                background-color: #333;
                border: 3px solid #333;
                margin-bottom: 20px;
            }

            .cell {
                width: 100px;
                height: 100px;
                background-color: #fff;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 40px;
                cursor: pointer;
                font-weight: bold;
                border: 1px solid #ccc;
                transition: background-color 0.2s;
            }

            .cell:hover {
                background-color: #eee;
            }

            #status {
                font-size: 1.2em;
                margin-bottom: 20px;
                font-weight: bold;
                min-height: 25px;
            }

            button {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                border: none;
                border-radius: 5px;
                background-color: #4caf50;
                color: white;
                transition: background-color 0.3s;
            }

            button:hover {
                background-color: #45a049;
            }
        </style>
    </head>
    <body>
        <h1>Tic-Tac-Toe</h1>

        <div id="status">Player X's Turn</div>

        <div id="gameBoard">
            <!-- Cells will be generated by JavaScript, but we can define placeholders -->
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button onclick="resetGame()">Restart Game</button>

        <script>
            const cells = document.querySelectorAll(".cell");
            const statusDisplay = document.getElementById("status");
            const statusText = document.getElementById("status");

            let board = ["", "", "", "", "", "", "", "", ""];
            let currentPlayer = "X";
            let isGameActive = true;

            const winningConditions = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6],
            ];

            // --- Game Logic ---

            function handleResultValidation(currentBoard) {
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    if (
                        currentBoard[a] &&
                        currentBoard[a] === currentBoard[b] &&
                        currentBoard[a] === currentBoard[c]
                    ) {
                        return true; // Winner found
                    }
                }
                return false; // No winner yet
            }

            function checkGameOver() {
                // Check for a winner (3 in a row)
                if (handleResultValidation(board)) {
                    isGameActive = false;
                    let winner =
                        currentPlayer === "X" ? "Player X" : "Player O";
                    statusDisplay.textContent = `🎉 ${winner} Wins! 🎉`;
                    return true;
                }

                // Check for a draw (if all cells are filled and no winner)
                if (!board.includes("") && !handleResultValidation(board)) {
                    isGameActive = false;
                    statusDisplay.textContent = "It's a Draw!";
                    return true;
                }

                return false;
            }

            function changeStatus(message) {
                statusDisplay.textContent = message;
            }

            function handleCellClick(event) {
                const clickedCell = event.target;
                const clickedIndex = parseInt(
                    clickedCell.getAttribute("data-index"),
                );

                if (board[clickedIndex] !== "" || !isGameActive) {
                    return; // Cell already played or game over
                }

                // Update the board state and UI
                board[clickedIndex] = currentPlayer;
                clickedCell.textContent = currentPlayer;

                // Check game state
                if (checkGameOver()) {
                    return;
                }

                // Switch player
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                changeStatus(`Player ${currentPlayer}'s Turn`);
            }

            function resetGame() {
                board = ["", "", "", "", "", "", "", "", ""];
                currentPlayer = "X";
                isGameActive = true;
                changeStatus("Player X's Turn");
                cells.forEach((cell) => (cell.textContent = ""));
            }

            // --- Event Listeners ---

            cells.forEach((cell) => {
                cell.addEventListener("click", handleCellClick);
            });

            // Initialize the game on load
            resetGame();
        </script>
    </body>
</html>
