<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: #fff;
            }

            h1 {
                font-size: 2.8rem;
                margin-bottom: 10px;
                text-transform: uppercase;
                letter-spacing: 6px;
                background: linear-gradient(90deg, #f857a6, #ff5858, #ffc371);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .status {
                font-size: 1.4rem;
                margin-bottom: 25px;
                height: 40px;
                display: flex;
                align-items: center;
                transition: all 0.3s;
            }

            .status .highlight {
                font-weight: bold;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(3, 120px);
                grid-template-rows: repeat(3, 120px);
                gap: 8px;
                margin-bottom: 30px;
            }

            .cell {
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid rgba(255, 255, 255, 0.15);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 3rem;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.2s ease;
                user-select: none;
            }

            .cell:hover:not(.taken) {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.35);
                transform: scale(1.05);
            }

            .cell.taken {
                cursor: default;
            }

            .cell.x {
                color: #f857a6;
                text-shadow: 0 0 20px rgba(248, 87, 166, 0.5);
            }

            .cell.o {
                color: #36d1dc;
                text-shadow: 0 0 20px rgba(54, 209, 220, 0.5);
            }

            .cell.win {
                animation: winPulse 0.6s ease-in-out infinite alternate;
                border-color: #ffc371;
                box-shadow: 0 0 25px rgba(255, 195, 113, 0.4);
            }

            @keyframes winPulse {
                from {
                    transform: scale(1);
                }
                to {
                    transform: scale(1.08);
                }
            }

            @keyframes pop {
                0% {
                    transform: scale(0);
                    opacity: 0;
                }
                60% {
                    transform: scale(1.2);
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            .cell span {
                animation: pop 0.25s ease-out;
                display: block;
            }

            .btn {
                padding: 14px 40px;
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: 2px;
                text-transform: uppercase;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                background: linear-gradient(135deg, #f857a6, #ff5858);
                color: #fff;
                transition: all 0.3s ease;
                box-shadow: 0 8px 25px rgba(248, 87, 166, 0.3);
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 35px rgba(248, 87, 166, 0.5);
            }

            .btn:active {
                transform: translateY(0);
            }

            .scoreboard {
                display: flex;
                gap: 40px;
                margin-bottom: 25px;
                font-size: 1.2rem;
            }

            .scoreboard div {
                text-align: center;
            }

            .scoreboard .score {
                font-size: 2rem;
                font-weight: 700;
            }

            .scoreboard .x-score .score {
                color: #f857a6;
            }
            .scoreboard .o-score .score {
                color: #36d1dc;
            }
            .scoreboard .d-score .score {
                color: #ffc371;
            }

            .board-wrapper {
                position: relative;
            }

            /* Draw line overlay for winning */
            .board {
                position: relative;
            }
        </style>
    </head>
    <body>
        <h1>Tic Tac Toe</h1>

        <div class="scoreboard">
            <div class="x-score">
                <div>Player X</div>
                <div class="score" id="x-score">0</div>
            </div>
            <div class="d-score">
                <div>Draws</div>
                <div class="score" id="d-score">0</div>
            </div>
            <div class="o-score">
                <div>Player O</div>
                <div class="score" id="o-score">0</div>
            </div>
        </div>

        <div class="status" id="status">
            Player <span class="highlight" style="color: #f857a6">X</span>'s
            turn
        </div>

        <div class="board" id="board"></div>

        <button class="btn" id="restart">New Game</button>

        <script>
            const boardEl = document.getElementById("board");
            const statusEl = document.getElementById("status");
            const restartBtn = document.getElementById("restart");

            let board = Array(9).fill("");
            let currentPlayer = "X";
            let gameActive = true;
            let scores = { X: 0, O: 0, D: 0 };

            const winCombos = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8], // rows
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8], // cols
                [0, 4, 8],
                [2, 4, 6], // diags
            ];

            function createBoard() {
                boardEl.innerHTML = "";
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.dataset.index = i;
                    cell.addEventListener("click", handleClick);
                    boardEl.appendChild(cell);
                }
            }

            function handleClick(e) {
                const idx = e.target.closest(".cell").dataset.index;

                if (board[idx] || !gameActive) return;

                board[idx] = currentPlayer;
                const cell = e.target.closest(".cell");
                cell.classList.add("taken", currentPlayer.toLowerCase());
                cell.innerHTML = `<span>${currentPlayer}</span>`;

                const winCombo = checkWin();
                if (winCombo) {
                    gameActive = false;
                    highlightWin(winCombo);
                    scores[currentPlayer]++;
                    updateScores();
                    statusEl.innerHTML = `Player <span class="highlight" style="color:${currentPlayer === "X" ? "#f857a6" : "#36d1dc"}">${currentPlayer}</span> wins! 🎉`;
                    return;
                }

                if (board.every((cell) => cell)) {
                    gameActive = false;
                    scores.D++;
                    updateScores();
                    statusEl.innerHTML = `It's a draw! 🤝`;
                    return;
                }

                currentPlayer = currentPlayer === "X" ? "O" : "X";
                updateStatus();
            }

            function checkWin() {
                for (const combo of winCombos) {
                    const [a, b, c] = combo;
                    if (
                        board[a] &&
                        board[a] === board[b] &&
                        board[a] === board[c]
                    ) {
                        return combo;
                    }
                }
                return null;
            }

            function highlightWin(combo) {
                const cells = boardEl.querySelectorAll(".cell");
                combo.forEach((i) => cells[i].classList.add("win"));
            }

            function updateStatus() {
                const color = currentPlayer === "X" ? "#f857a6" : "#36d1dc";
                statusEl.innerHTML = `Player <span class="highlight" style="color:${color}">${currentPlayer}</span>'s turn`;
            }

            function updateScores() {
                document.getElementById("x-score").textContent = scores.X;
                document.getElementById("o-score").textContent = scores.O;
                document.getElementById("d-score").textContent = scores.D;
            }

            function resetGame() {
                board = Array(9).fill("");
                currentPlayer = "X";
                gameActive = true;
                createBoard();
                updateStatus();
            }

            restartBtn.addEventListener("click", resetGame);

            createBoard();
        </script>
    </body>
</html>
